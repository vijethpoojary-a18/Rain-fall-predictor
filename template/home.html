<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainfall Prediction</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #2193b0, #6dd5ed);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 950px;
            margin: auto;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            color: #444;
        }

        input,
        select {
            border-radius: 12px !important;
            padding: 10px !important;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #2193b0;
            border: none;
            border-radius: 12px;
            padding: 10px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #18667a;
        }

        .result-box {
            margin-top: 25px;
            text-align: center;
            font-size: 1.5rem;
            color: #333;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <form action="/predict" method="POST">
            <h1>Rainfall Prediction</h1>
            <div class="row g-3">

                <div class="col-md-6">
                    <label for="date">Date</label>
                    <input type="date" class="form-control" name="date" required>
                </div>

                <div class="col-md-6">
                    <label for="mintemp">Min Temperature (°C)</label>
                    <input type="number" step="any" class="form-control" name="mintemp" required>
                </div>

                <div class="col-md-6">
                    <label for="maxtemp">Max Temperature (°C)</label>
                    <input type="number" step="any" class="form-control" name="maxtemp" required>
                </div>

                <div class="col-md-6">
                    <label for="rainfall">Rainfall (mm)</label>
                    <input type="number" step="any" class="form-control" name="rainfall" required>
                </div>

                <div class="col-md-6">
                    <label for="evaporation">Evaporation (mm)</label>
                    <input type="number" step="any" class="form-control" name="evaporation" required>
                </div>

                <div class="col-md-6">
                    <label for="sunshine">Sunshine (hrs)</label>
                    <input type="number" step="any" class="form-control" name="sunshine" required>
                </div>

                <div class="col-md-6">
                    <label for="windgustspeed">Wind Gust Speed (km/h)</label>
                    <input type="number" step="any" class="form-control" name="windgustspeed" required>
                </div>

                <div class="col-md-6">
                    <label for="windspeed9am">Wind Speed at 9AM (km/h)</label>
                    <input type="number" step="any" class="form-control" name="windspeed9am" required>
                </div>

                <div class="col-md-6">
                    <label for="windspeed3pm">Wind Speed at 3PM (km/h)</label>
                    <input type="number" step="any" class="form-control" name="windspeed3pm" required>
                </div>

                <div class="col-md-6">
                    <label for="humidity9am">Humidity at 9AM (%)</label>
                    <input type="number" step="any" class="form-control" name="humidity9am" required>
                </div>

                <div class="col-md-6">
                    <label for="humidity3pm">Humidity at 3PM (%)</label>
                    <input type="number" step="any" class="form-control" name="humidity3pm" required>
                </div>

                <div class="col-md-6">
                    <label for="pressure9am">Pressure at 9AM (hPa)</label>
                    <input type="number" step="any" class="form-control" name="pressure9am" required>
                </div>

                <div class="col-md-6">
                    <label for="pressure3pm">Pressure at 3PM (hPa)</label>
                    <input type="number" step="any" class="form-control" name="pressure3pm" required>
                </div>

                <div class="col-md-6">
                    <label for="temp9am">Temperature at 9AM (°C)</label>
                    <input type="number" step="any" class="form-control" name="temp9am" required>
                </div>

                <div class="col-md-6">
                    <label for="temp3pm">Temperature at 3PM (°C)</label>
                    <input type="number" step="any" class="form-control" name="temp3pm" required>
                </div>

                <div class="col-md-6">
                    <label for="cloud9am">Cloud at 9AM (oktas)</label>
                    <input type="number" step="1" class="form-control" name="cloud9am" required>
                </div>

                <div class="col-md-6">
                    <label for="cloud3pm">Cloud at 3PM (oktas)</label>
                    <input type="number" step="1" class="form-control" name="cloud3pm" required>
                </div>

                <div class="col-md-6">
                    <label for="winddir9am">Wind Direction at 9AM</label>
                    <select class="form-select" name="winddir9am" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">NNW (0)</option>
                        <option value="1">N (1)</option>
                        <option value="2">NW (2)</option>
                        <option value="3">NNE (3)</option>
                        <option value="4">WNW (4)</option>
                        <option value="5">W (5)</option>
                        <option value="6">WSW (6)</option>
                        <option value="7">SW (7)</option>
                        <option value="8">SSW (8)</option>
                        <option value="9">NE (9)</option>
                        <option value="10">S (10)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="winddir3pm">Wind Direction at 3PM</label>
                    <select class="form-select" name="winddir3pm" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">NW (0)</option>
                        <option value="1">NNW (1)</option>
                        <option value="2">N (2)</option>
                        <option value="3">WNW (3)</option>
                        <option value="4">W (4)</option>
                        <option value="5">NNE (5)</option>
                        <option value="6">WSW (6)</option>
                        <option value="7">SSW (7)</option>
                        <option value="8">S (8)</option>
                        <option value="9">SW (9)</option>
                        <option value="10">SE (10)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="windgustdir">Wind Gust Direction</label>
                    <select class="form-select" name="windgustdir" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">NNW (0)</option>
                        <option value="1">NW (1)</option>
                        <option value="2">WNW (2)</option>
                        <option value="3">N (3)</option>
                        <option value="4">W (4)</option>
                        <option value="5">WSW (5)</option>
                        <option value="6">NNE (6)</option>
                        <option value="7">S (7)</option>
                        <option value="8">SSW (8)</option>
                        <option value="9">SW (9)</option>
                        <option value="10">SSE (10)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="raintoday">Rain Today</label>
                    <select class="form-select" name="raintoday" required>
                        <option value="" disabled selected>Did it rain?</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>



                <div class="col-12 text-center mt-3">
                    <button type="submit" class="btn btn-primary">Predict</button>
                </div>

            </div>
        </form>

        {% if prediction %}
        <div class="result-box">
            Prediction: {{ prediction }}
        </div>
        {% endif %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
